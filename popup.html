<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root{
      --rap-purple:#6C63FF;
      --rap-purple-hover:#5B53F0;
      --rap-text:#111827;
      --rap-bg:#ffffff;
      --rap-font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --rap-border: rgba(17,24,39,.14);
      --rap-muted:#6b7280;
      --rap-ok:#0f766e;
    }
    body{
      font-family:var(--rap-font);
      background:var(--rap-bg);
      color:var(--rap-text);
      margin:0;
      padding:16px;
      width:340px;
    }
    .title{ font-size:18px; font-weight:800; margin:0 0 6px 0; }
    .subhead{ font-size:12px; color:var(--rap-muted); margin-bottom:12px; }
    .btn, .ghost, .miniBtn, .input{
      border-radius:10px;
      font-family:var(--rap-font);
    }
    .btn{
      width:100%; background:var(--rap-purple); color:#fff; border:none; padding:12px 14px;
      font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 6px 18px rgba(17,24,39,.12);
    }
    .btn:hover{ background:var(--rap-purple-hover); }
    .ghost, .miniBtn{
      background:#fff; color:var(--rap-text); border:1px solid var(--rap-border); cursor:pointer;
    }
    .ghost{ width:100%; padding:10px 12px; font-size:14px; font-weight:700; margin-top:10px; }
    .ghost:hover, .miniBtn:hover{ background:rgba(17,24,39,.04); }
    .row{ display:flex; gap:8px; margin-top:10px; }
    .row .ghost, .row .miniBtn{ margin-top:0; }
    .miniBtn{ padding:10px 12px; font-size:13px; font-weight:700; }
    .status{
      margin-top:12px; padding:10px 12px; border:1px solid var(--rap-border); border-radius:12px; background:rgba(108,99,255,.06);
      font-size:12px; line-height:1.5;
    }
    .status strong{ color:var(--rap-ok); }
    .searchWrap{ margin-top:12px; display:none; }
    .input{
      width:100%; box-sizing:border-box; border:1px solid var(--rap-border); padding:10px 12px; font-size:13px;
    }
    .slots{
      margin-top:10px; border-top:1px solid rgba(17,24,39,.10); padding-top:10px; max-height:260px; overflow:auto; display:none;
    }
    .slotItem{ border:1px solid rgba(17,24,39,.12); border-radius:10px; padding:8px 10px; margin-bottom:8px; cursor:pointer; font-size:13px; font-weight:700; }
    .slotItem:hover{ background:rgba(17,24,39,.04); }
    .subtle{ font-size:11px; color:var(--rap-muted); font-weight:600; margin-top:4px; }
    .hint{ margin-top:12px; font-size:12px; line-height:1.4; color:#374151; }
    .empty{ padding:10px 0; color:var(--rap-muted); font-size:12px; }
  </style>
</head>
<body>
  <div class="title">Raptive Bad Ads Inspector</div>
  <div id="subhead" class="subhead">Use the inspector on the current tab only. Each tab/page keeps its own separate flow and state.</div>

  <button id="toggle" class="btn">Show ad info</button>
  <div class="row">
    <button id="viewSlots" class="ghost" style="display:none;">View ad slots</button>
    <button id="resumeNow" class="miniBtn" style="display:none;">Resume now</button>
  </div>

  <div id="status" class="status"></div>
  <div id="searchWrap" class="searchWrap">
    <input id="slotSearch" class="input" type="search" placeholder="Filter slots by id" />
  </div>
  <div id="slots" class="slots"></div>

  <div class="hint">This popup always controls the current tab only. A different tab starts from the initial state, and each page keeps its own separate inspection flow.</div>
  <script src="popup.js"></script>
</body>
</html>
